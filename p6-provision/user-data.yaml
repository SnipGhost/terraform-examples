#cloud-config
package_update: true
package_upgrade: false

packages:
  - nginx

write_files:
  - path: /var/www/html/index.html
    owner: root:root
    permissions: "0644"
    content: |
      <!doctype html>
      <html lang="ru">
      <head>
        <meta charset="utf-8" />
        <title>It works</title>
      </head>
      <body>
        <h1>Nginx установлен и работает</h1>
        <p>Создано через cloud-init user-data.</p>
      </body>
      </html>

runcmd:
  - systemctl enable --now nginx
  - nginx -t
  - systemctl reload nginx
